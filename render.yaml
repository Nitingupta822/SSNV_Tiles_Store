databases:
  - name: tiles-db
    plan: free

services:
  - type: web
    name: tiles-stock-app
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend wsgi:app
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tiles-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
