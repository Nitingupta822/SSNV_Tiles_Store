<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>SSNV Store | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --primary: #7c4dff;
      --primary-dark: #6236ff;
      --bg-dark: #0d0f14;
      --card-bg: rgba(255, 255, 255, 0.95);
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Outfit', sans-serif;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      background-color: var(--bg-dark);
      overflow-x: hidden;
    }

    /* Animated Mesh Gradient Background */
    .bg-animation {
      position: absolute;
      inset: -50%;
      background-image:
        radial-gradient(ellipse at 50% 50%, rgba(124, 77, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 201, 167, 0.1) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(255, 82, 117, 0.1) 0%, transparent 40%);
      background-size: 100% 100%;
      animation: rotateBg 30s linear infinite;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes rotateBg {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Abstract Particles Overlay */
    .particles {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: 2;
      pointer-events: none;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      perspective: 1000px;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      transform-style: preserve-3d;
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(40px) rotateX(-5deg);
      }

      to {
        opacity: 1;
        transform: translateY(0) rotateX(0);
      }
    }

    .login-header {
      padding: 3rem 2.5rem 1.5rem;
      text-align: center;
      position: relative;
    }

    .logo-container {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary) 0%, #b47cff 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
      color: #fff;
      box-shadow: 0 12px 32px rgba(124, 77, 255, 0.4);
      position: relative;
    }

    .logo-container::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 24px;
      border: 2px solid var(--primary);
      opacity: 0.3;
      animation: pulseBorder 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulseBorder {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.3;
      }

      50% {
        transform: scale(1.05);
        opacity: 0;
      }
    }

    .login-header h1 {
      color: #0d0f14;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
      letter-spacing: -0.5px;
    }

    .login-header p {
      color: #6b7280;
      margin: 0;
      font-size: 0.95rem;
    }

    .login-body {
      padding: 0 2.5rem 2.5rem;
    }

    /* Floating Labels */
    .form-floating {
      margin-bottom: 1.25rem;
      position: relative;
    }

    .form-floating>.form-control {
      border-radius: 14px;
      border: 2px solid #e5e7eb;
      background: #f9fafb;
      padding: 1rem 1.25rem;
      height: 60px;
      font-size: 1rem;
      color: #111827;
      transition: all 0.3s;
    }

    .form-floating>.form-control:focus {
      background: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(124, 77, 255, 0.15);
    }

    .form-floating>label {
      padding: 1.1rem 1.25rem;
      color: #6b7280;
      font-weight: 500;
      display: flex;
      align-items: center;
    }

    .form-floating>.form-control:focus~label,
    .form-floating>.form-control:not(:placeholder-shown)~label {
      color: var(--primary);
      transform: scale(0.85) translateY(-0.8rem) translateX(0.15rem);
      background: transparent;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      padding: 0.5rem;
      font-size: 1.2rem;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--primary);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, #b47cff 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(124, 77, 255, 0.3);
    }

    .btn-login::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transform: skewX(-20deg);
      transition: 0.5s;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124, 77, 255, 0.4);
      color: #fff;
    }

    .btn-login:hover::before {
      left: 150%;
    }

    .login-footer {
      padding: 1.5rem 2.5rem;
      background: rgba(249, 250, 251, 0.8);
      backdrop-filter: blur(10px);
      text-align: center;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 0 0 24px 24px;
    }

    .login-footer p {
      margin: 0;
      color: #6b7280;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .login-footer i {
      color: var(--primary);
    }

    /* Custom Alert */
    .alert {
      border-radius: 12px;
      border: none;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
    }

    .alert i {
      font-size: 1.25rem;
    }

    /* ===== WELCOME SPLASH SCREEN ===== */
    #welcome-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
    }

    #welcome-splash.slide-up {
      transform: translateY(-100%);
    }

    .splash-logo {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary) 0%, #b47cff 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: #fff;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(124, 77, 255, 0.5);
      animation: popIn 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
    }

    .splash-title {
      font-size: 3.5rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
    }

    .splash-subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      font-weight: 600;
      animation: fadeUp 0.6s ease 0.7s both;
    }

    .splash-dots {
      display: flex;
      gap: 10px;
      margin-top: 3rem;
      animation: fadeUp 0.6s ease 0.9s both;
    }

    .splash-dots span {
      width: 8px;
      height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    .splash-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .splash-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.6);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
        background: #b47cff;
      }
    }
  </style>
</head>

<body>

  <!-- Welcome Splash Screen -->
  <div id="welcome-splash">
    <div class="splash-logo"><i class="bi bi-grid-3x3-gap-fill"></i></div>
    <div class="splash-title">SSNV Store</div>
    <div class="splash-subtitle">Tiles Stock Management</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- Background Elements -->
  <div class="bg-animation"></div>
  <div class="particles"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-container"><i class="bi bi-grid-3x3-gap-fill"></i></div>
        <h1>Welcome Back</h1>
        <p>Sign in to manage your stock</p>
      </div>

      <div class="login-body">
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div
          class="alert {{ 'alert-success' if 'Welcome' in message or 'success' in message.lower() or 'logged out' in message.lower() else 'alert-danger' }}">
          <i
            class="bi {{ 'bi-check-circle-fill' if 'Welcome' in message or 'success' in message.lower() or 'logged out' in message.lower() else 'bi-exclamation-triangle-fill' }}"></i>
          <div>{{ message }}</div>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
          <div class="form-floating">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required
              autofocus />
            <label for="username"><i class="bi bi-person-fill me-2"></i>Username</label>
          </div>

          <div class="form-floating">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required />
            <label for="password"><i class="bi bi-lock-fill me-2"></i>Password</label>
            <button type="button" class="password-toggle" id="togglePassword" title="Show/Hide Password">
              <i class="bi bi-eye-fill"></i>
            </button>
          </div>

          <button type="submit" class="btn-login">
            Sign In <i class="bi bi-arrow-right ms-2"></i>
          </button>
        </form>
      </div>

      <div class="login-footer">
        <p><i class="bi bi-shield-check me-1"></i>Secure connection. Contact admin for access.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Hide splash screen after 2.5s
    window.addEventListener('load', function () {
      setTimeout(function () {
        var splash = document.getElementById('welcome-splash');
        splash.classList.add('slide-up');
        splash.addEventListener('transitionend', function () { splash.remove(); });
      }, 2500);
    });

    // Toggle Password Visibility
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', function () {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.innerHTML = type === 'password' ? '<i class="bi bi-eye-fill"></i>' : '<i class="bi bi-eye-slash-fill"></i>';
    });
  </script>
</body>

</html>
